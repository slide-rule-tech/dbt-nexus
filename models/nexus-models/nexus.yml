version: 2

models:
  - name: nexus_events
    description:
      "Unified events table containing all events from enabled sources"
    tests:
      - unique:
          column_name: event_id
          config:
            severity: error
    columns:
      - name: event_id
        description: "Unique identifier for the event"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'evt_%'"
              config:
                severity: warn
      - name: occurred_at
        description: "Timestamp when the event occurred"
        tests:
          - not_null:
              config:
                severity: error

  - name: nexus_entity_identifiers
    description:
      "Unified entity identifiers table containing all entity identifiers from
      enabled sources"
    tests:
      - unique:
          column_name: entity_identifier_id
          config:
            severity: error
    columns:
      - name: entity_identifier_id
        description: "Unique identifier for the entity identifier record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_idfr_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn

  - name: nexus_entity_traits
    description:
      "Unified entity traits table containing all entity traits from enabled
      sources"
    tests:
      - unique:
          column_name: entity_trait_id
          config:
            severity: error
    columns:
      - name: entity_trait_id
        description: "Unique identifier for the entity trait record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_tr_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn

  - name: nexus_entities
    description: "Final entities table with resolved entity data"
    tests:
      - unique:
          column_name: entity_id
          config:
            severity: error
    columns:
      - name: entity_id
        description: "Unique identifier for the entity"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, task, contract, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn

  - name: nexus_relationships
    description: "Final relationships table with resolved relationship data"
    tests:
      - unique:
          column_name: relationship_id
          config:
            severity: error
    columns:
      - name: relationship_id
        description: "Unique identifier for the relationship"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'rel_%'"
              config:
                severity: warn
      - name: entity_a_id
        description: "ID of the first entity in the relationship"
        tests:
          - not_null:
              config:
                severity: error
      - name: entity_b_id
        description: "ID of the second entity in the relationship"
        tests:
          - not_null:
              config:
                severity: error
      - name: relationship_type
        description:
          "Type of relationship (advisor_client, manager_employee, etc.)"
        tests:
          - not_null:
              config:
                severity: error

  - name: nexus_entity_participants
    description: "Entity participants linking entities to events"
    tests:
      - unique:
          column_name: entity_participant_id
          config:
            severity: error
    columns:
      - name: entity_participant_id
        description: "Unique identifier for the entity participant record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_prt_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn

  - name: nexus_resolved_entity_identifiers
    description: "Resolved entity identifiers after identity resolution"
    tests:
      - unique:
          column_name: entity_identifier_id
          config:
            severity: error
    columns:
      - name: entity_identifier_id
        description:
          "Unique identifier for the resolved entity identifier record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_idfr_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn
      - name: entity_id
        description: "Resolved entity ID after identity resolution"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_%'"
              config:
                severity: warn

  - name: nexus_resolved_entity_traits
    description: "Resolved entity traits after identity resolution"
    tests:
      - unique:
          column_name: entity_trait_id
          config:
            severity: error
    columns:
      - name: entity_trait_id
        description: "Unique identifier for the resolved entity trait record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_tr_%'"
              config:
                severity: warn
      - name: entity_type
        description: "Type of entity (person, group, etc.)"
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values:
                [
                  "person",
                  "group",
                  "task",
                  "contract",
                  "product",
                  "location",
                  "event_series",
                ]
              config:
                severity: warn
      - name: entity_id
        description: "Resolved entity ID after identity resolution"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_%'"
              config:
                severity: warn

  - name: nexus_entity_identifiers_edges
    description: "Edges connecting entity identifiers for identity resolution"
    tests:
      - unique:
          column_name:
            "edge_id || '|' || identifier_type_a || '|' || identifier_value_a ||
            '|' || identifier_type_b || '|' || identifier_value_b"
          config:
            severity: error
    columns:
      - name: edge_id
        description: "Unique identifier for the entity identifier edge"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'ent_edg_%'"
              config:
                severity: warn

  - name: nexus_states
    description: "States table for tracking entity state changes"
    tests:
      - unique:
          column_name: state_id
          config:
            severity: error
    columns:
      - name: state_id
        description: "Unique identifier for the state record"
        tests:
          - not_null:
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "like 'st_%'"
              config:
                severity: warn
